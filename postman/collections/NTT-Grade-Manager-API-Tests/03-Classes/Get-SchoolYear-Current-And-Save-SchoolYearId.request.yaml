$kind: http-request
name: Get SchoolYear Current And Save SchoolYearId
method: GET
url: "{{baseUrl}}/api/school-years/current"
order: 900
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
headers:
  - key: Authorization
    value: "Bearer {{authToken}}"
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Save schoolYearId", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.eql(true);
          pm.expect(json.data).to.have.property("_id");
          pm.collectionVariables.set("schoolYearId", json.data._id);
          pm.environment.set("schoolYearId", json.data._id);
      });
