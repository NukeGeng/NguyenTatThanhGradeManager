$kind: http-request
name: Create Grade Duplicate
method: POST
url: '{{baseUrl}}/api/grades'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "studentId": "{{studentId}}",
      "classId": "{{classId}}",
      "txScores": [6, 6, 7],
      "gkScore": 6.5,
      "tktScore": 6
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 409", function () {
          pm.response.to.have.status(409);
      });
      pm.test("success is false", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.eql(false);
      });
