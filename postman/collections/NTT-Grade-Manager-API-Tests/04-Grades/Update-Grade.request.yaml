$kind: http-request
name: Update Grade
method: PUT
url: '{{baseUrl}}/api/grades/{{gradeId}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'
body:
  type: json
  content: |-
    {
      "txScores": [7, 8, 7.5],
      "gkScore": 7,
      "thScores": [8, 8.5],
      "tktScore": 7.5,
      "isDuThi": true,
      "isVangThi": false
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response has success true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });

      pm.test("Response contains updated grade data", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.be.an("object");
        pm.expect(json.message).to.equal("Update grade successfully");
      });

      pm.test("Updated scores are reflected", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.have.property("tktScore");
        pm.expect(json.data).to.have.property("gkScore");
      });
