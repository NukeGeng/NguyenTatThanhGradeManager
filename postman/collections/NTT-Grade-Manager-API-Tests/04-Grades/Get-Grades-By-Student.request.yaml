$kind: http-request
name: Get Grades By Student
method: GET
url: '{{baseUrl}}/api/grades/student/{{studentId}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response has success true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });

      pm.test("Response data is an array", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.be.an("array");
      });

      pm.test("Message is correct", function () {
        const json = pm.response.json();
        pm.expect(json.message).to.equal("Get student grades successfully");
      });

      pm.test("Each grade has required fields", function () {
        const json = pm.response.json();
        if (json.data.length > 0) {
          const grade = json.data[0];
          pm.expect(grade).to.have.property("studentId");
          pm.expect(grade).to.have.property("classId");
          pm.expect(grade).to.have.property("subjectId");
        }
      });
