$kind: http-request
name: Get Departments And Save DepartmentId
method: GET
url: "{{baseUrl}}/api/departments"
order: 2500
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
headers:
  - key: Authorization
    value: "Bearer {{authToken}}"
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Save first departmentId", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.eql(true);
          pm.expect(Array.isArray(json.data)).to.eql(true);
          pm.expect(json.data.length).to.be.above(0);
          pm.collectionVariables.set("departmentId", json.data[0]._id);
            pm.environment.set("departmentId", json.data[0]._id);
      });
