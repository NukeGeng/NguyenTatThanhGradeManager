$kind: http-request
name: Create Student
method: POST
url: "{{baseUrl}}/api/students"
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "Nguyen Van A",
      "gender": "male",
      "classId": "{{classId}}",
      "parentPhone": "0900000001"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
      pm.test("success is true", function () {
          var json = pm.response.json();
          pm.expect(json.success).to.eql(true);
      });
      pm.test("data.studentCode exists and matches pattern HS\\d+", function () {
          var json = pm.response.json();
          pm.expect(json.data).to.have.property("studentCode");
          pm.expect(json.data.studentCode).to.match(/^HS\d+$/);
      });
      pm.test("Save studentId", function () {
          var json = pm.response.json();
          pm.collectionVariables.set("studentId", json.data._id);
          pm.environment.set("studentId", json.data._id);
      });
