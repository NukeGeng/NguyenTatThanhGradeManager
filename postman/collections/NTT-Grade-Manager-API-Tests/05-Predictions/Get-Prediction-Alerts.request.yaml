$kind: http-request
name: Get Prediction Alerts
method: GET
url: '{{baseUrl}}/api/predictions/alerts'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response has success true", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });

      pm.test("Response data is an array", function () {
        const json = pm.response.json();
        pm.expect(json.data).to.be.an("array");
      });

      pm.test("Message is correct", function () {
        const json = pm.response.json();
        pm.expect(json.message).to.equal("Get high risk alerts successfully");
      });

      pm.test("All returned predictions have high riskLevel", function () {
        const json = pm.response.json();
        json.data.forEach(function (prediction) {
          pm.expect(prediction.riskLevel).to.equal("high");
        });
      });

      pm.test("Each alert has student and grade info", function () {
        const json = pm.response.json();
        if (json.data.length > 0) {
          const alert = json.data[0];
          pm.expect(alert).to.have.property("studentId");
          pm.expect(alert).to.have.property("gradeId");
          pm.expect(alert).to.have.property("predictedRank");
          pm.expect(alert).to.have.property("confidence");
          pm.expect(alert).to.have.property("weakSubjects");
          pm.expect(alert).to.have.property("suggestions");
        }
      });
