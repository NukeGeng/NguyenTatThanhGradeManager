$kind: http-request
name: Predict Invalid Grade
method: POST
url: '{{baseUrl}}/api/predictions/predict'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'
body:
  type: json
  content: |-
    {
      "gradeId": ""
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400 for missing gradeId", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has success false", function () {
        const json = pm.response.json();
        pm.expect(json.success).to.be.false;
      });

      pm.test("Error message indicates gradeId is required", function () {
        const json = pm.response.json();
        pm.expect(json.message).to.include("gradeId");
      });
